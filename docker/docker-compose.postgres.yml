# Dev Postgres for the event store (matches default DATABASE_URL in db/session.py).

services:
  postgres:
    image: postgres:16-alpine
    container_name: via-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: eei
      POSTGRES_DB: postgres
    ports:
      - "5432:5432"
    volumes:
      - via_pgdata:/var/lib/postgresql/data

volumes:
  via_pgdata:
