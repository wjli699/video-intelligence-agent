# Copy to config.yml next to docker-compose.frigate.yml and set your RTSP URL.
#
# Docker (root docker-compose.yml): use broker hostname `mosquitto` and port 1883.
# Host / bare-metal broker: use 127.0.0.1 or your broker IP.

mqtt:
  enabled: true
  host: mosquitto
  port: 1883

detectors:
  cpu1:
    type: cpu

cameras:
  demo_cam:
    ffmpeg:
      inputs:
        - path: rtsp://YOUR_STREAM
          roles:
            - detect
    detect:
      width: 640
      height: 360
      fps: 5
    objects:
      track:
        - person
        - car
