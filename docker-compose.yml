# Full stack (Mini PC or Jetson): Mosquitto + Postgres + Frigate + VIA ingest (Docker network DNS).
# Prerequisites: copy config.yml.example to config.yml and set your RTSP URL.
#
#   cp config.yml.example config.yml
#   docker compose up -d
#
# Test MQTT from host:
#   docker exec -it mosquitto mosquitto_sub -t "frigate/events"

services:
  mosquitto:
    image: eclipse-mosquitto:2
    container_name: mosquitto
    restart: unless-stopped
    ports:
      - "1883:1883"
    volumes:
      - ./mosquitto/config:/mosquitto/config
      - ./mosquitto/data:/mosquitto/data
      - ./mosquitto/log:/mosquitto/log

  postgres:
    image: postgres:16-alpine
    container_name: via-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: eei
      POSTGRES_DB: postgres
    ports:
      - "5432:5432"
    volumes:
      - via_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  frigate:
    image: ghcr.io/blakeblackshear/frigate:stable
    container_name: frigate
    restart: unless-stopped
    privileged: true
    shm_size: "512mb"
    depends_on:
      - mosquitto
    ports:
      - "5000:5000"
      - "8554:8554"
    volumes:
      - ./config.yml:/config/config.yml
      - ./media:/media/frigate
    environment:
      - FRIGATE_RTSP_PASSWORD=password

  via-ingest:
    build: .
    image: video-intel-agent-ingest:latest
    container_name: via-ingest
    restart: unless-stopped
    depends_on:
      mosquitto:
        condition: service_started
      postgres:
        condition: service_healthy
    environment:
      MQTT_HOST: mosquitto
      MQTT_PORT: "1883"
      MQTT_TOPIC: frigate/events
      DATABASE_URL: postgresql+psycopg2://postgres:eei@postgres:5432/postgres
      INIT_DB_ON_INGEST_STARTUP: "1"

volumes:
  via_pgdata:
